<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <form>
        <input type="text" placeholder="Nombre" id="nombre" required>
        <input type="text" placeholder="Apellidos" id="apellidos" required>
        <input type="number" placeholder="Edad" id="edad" required>
        <input type="text" placeholder="Ciudad" id="ciudad" required>
    </br></br>
    <fieldset>
        <legend>Hobbies</legend>

        <input type="checkbox" id="deporte" name="hobbies">Deporte
        <input type="checkbox" id="lectura" name="hobbies">Lectura
        <input type="checkbox" id="musica" name="hobbies">Música
        <input type="checkbox" id="cine" name="hobbies">Cine
        <input type="checkbox" id="teatro" name="hobbies">Teatro
        <input type="checkbox" id="coleccionismo" name="hobbies">Coleccionismo
        <input type="checkbox" id="bricolaje" name="hobbies">Bricolaje
        <input type="checkbox" id="cosplay" name="hobbies">Cosplay

    </fieldset>

    </br>
    <button type="button" id="enviarBoton">Enviar</button>

    </form>
    </br>
    <a id="mensaje" style="color: red;"></a>
    </br>
    </br>
    <table border="1">
        <tr>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Edad</th>
            <th>Ciudad</th>
            <th>Hobbies</th>
        </tr>
        <tbody id="cuerpoDeTabla">


        </tbody>
    </table>

</body>
<script>

let listaUsuarios=[];

function comprobarValores(){

    let seEjecuta=true;

    let nombre=$("#nombre").val();
    let apellido=$("#apellidos").val();
    let edad=$("#edad").val();
    let ciudad=$("#ciudad").val();

    if(nombre==""){
        seEjecuta=false
    }
    if(apellido==""){
        seEjecuta=false
    }
    if(ciudad==""){
        seEjecuta=false
    }
    if(edad==""){
        seEjecuta=false
    }

    return seEjecuta;
}

function sacarDatos(){

    let listaHobbies=[];  

    $("input[name='hobbies']:checked").each(function() {
        listaHobbies.push(this.id);
    });

    return {
       apellidos: $("#apellidos").val(),
       nombre: $("#nombre").val(),
       edad: $("#edad").val(),
       ciudad: $("#ciudad").val(),
       hobbies: listaHobbies,
    }; 
}

function añadirObjetoArray(obj){
    listaUsuarios.push(obj);
}

function crearFila(usuarioActual, indice){

    return`<tr onclick="eliminarFila(${indice})" style="cursor:pointer">
        <td>${usuarioActual.nombre}</td>
        <td>${usuarioActual.apellidos}</td>
        <td>${usuarioActual.edad}</td>
        <td>${usuarioActual.ciudad}</td>
        <td>${hobbiesTexto(usuarioActual)}</td>
        </tr>`
}

function hobbiesTexto(usuarioActual){

    let texto="";

    usuarioActual.hobbies.forEach(hobbie => {
        texto+=(hobbie + "<br>");
    });

    return texto
}

function añadirArrayTabla(lista){

    $("#cuerpoDeTabla").empty();

    lista.forEach((usuarioActual, indice) => {
        let fila=crearFila(usuarioActual, indice);
        $("#cuerpoDeTabla").append(fila);
    });   
}

function eliminarFila(indice){

    listaUsuarios.splice(indice, 1);
    añadirArrayTabla(listaUsuarios);

}

function mensajeError(){

    if(comprobarValores()){
        $("#mensaje").text("");
    }else{
         $("#mensaje").text("ERROR, debes insertar todos los datos necesarios (nombre, apellidos, edad y ciudad)");
    }
}

$("#enviarBoton").on("click", function(){

if(comprobarValores()){

    let usuarioActual = sacarDatos();

    añadirObjetoArray(usuarioActual);
    
    añadirArrayTabla(listaUsuarios);
}
mensajeError();
})

$("input[name='hobbies']").on("click", function() {
    
    let cuantosHay = $("input[name='hobbies']:checked").length;

    if (cuantosHay >= 3) {
       $("input[name='hobbies']").each(function() {
            if (this.checked == false) {
                this.disabled = true; 
            }
        });
    } else {
        $("input[name='hobbies']").each(function() {
            this.disabled = false;
        });
    }
});
    
</script>
</html>
