<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form>
   <fieldset>
    <a>Ingresa Numero: </a><input type="text" id="Numero">
    <a id="mayorMenor"></a>
    </br></br>
    <button type="button" id="boton">Ingresa numero</button>
    </fieldset>

    </br>
    CARTERA: <div id="cartera"></div>
    PUNTOS: <div id="puntos"></div>
    <div id="fallo"></div>
    <div id="numeroBuscar"></div>



        </form>
</body>

<script>

let numeroAleatorio = Math.floor(Math.random() * 101);  

let cartera=10;

let puntos=0;


    
document.getElementById("numeroBuscar").textContent=numeroAleatorio;

document.getElementById("cartera").textContent=cartera;
document.getElementById("puntos").textContent=puntos;

document.getElementById("boton").addEventListener("click", function(){


numeroIngresado = parseInt(document.getElementById("Numero").value);


if(numeroIngresado>numeroAleatorio){

document.getElementById("mayorMenor").innerText="Menor";
    
}else{

document.getElementById("mayorMenor").innerText="Mayor";

    
}

if(cartera>0){
if(numeroAleatorio===numeroIngresado){


puntos+=cartera;
document.getElementById("puntos").textContent=puntos;

numeroAleatorio = Math.floor(Math.random() * 101);  
document.getElementById("numeroBuscar").textContent=numeroAleatorio;


}


cartera--
document.getElementById("cartera").textContent=cartera;


}else{

document.getElementById("fallo").textContent="NO QUEDAN PUNTOS EN LA CARTERA"
document.getElementById("fallo").innerHTML="NO QUEDAN PUNTOS EN LA CARTERA <br><br> <button type='button' id='botonReiniciar'>Reiniciar Juego</button>";


document.getElementById("botonReiniciar").addEventListener("click", function(){

 document.getElementById("fallo").innerHTML="";   

cartera=10;
document.getElementById("cartera").textContent=cartera;
puntos=0;
document.getElementById("puntos").textContent=puntos;


numeroAleatorio = Math.floor(Math.random() * 101);  
document.getElementById("numeroBuscar").textContent=numeroAleatorio;

})

}





})


</script>


</html>
