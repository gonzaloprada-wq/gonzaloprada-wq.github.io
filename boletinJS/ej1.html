<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <form id="miFormulario1" name="F">

    <fieldset>

    </br>
    <legend><strong>INGRESA DATOS</strong></legend>

    <label for="nombreIngresado"><strong>Ingresa tu nombre: </strong></label>
    <input type="text" id="nombreIngresado" name="nombreIngresado" required>
    </br>
    </br>
    <label for="edad"><strong>Ingresa tu edad: </strong></label>
    <input type="number" id="edad" name="edad" required>

    </br></br>
    <button type="submit" id="btnEnviar">Enviar Formulario</button>

    </fieldset>
    </form>
    <p id="fraseDatos"></p>

    <form>
        <fieldset>
            <legend><strong>CALCULADORA</strong></legend>
            <br>
            
    <label for="valor1"><strong></strong></label>
    <input type="number" id="valor1" name="valor1" required>
<label for="operacion"></label>
<select id="operacion" name="operacion">
    <option value="Suma">+</option>
    <option value="Resta">-</option>
    <option value="Multiplicacion">x</option>
    <option value="Division">/</option>
</select>
    <label for="valor2"><strong></strong></label>
    <input type="number" id="valor2" name="valor2" required>
        <strong>=</strong>

  <strong id="resultadoOperacion"></strong>
  </br>
  </br>

    <button type="submit" id="btnCalcular">Calcular</button>
        </fieldset>
    </form>



  <script>
    document.querySelector("#btnEnviar").addEventListener("click", function(event) {
        
        event.preventDefault();

       
        const nombre = document.getElementById("nombreIngresado");
        const edad = document.getElementById("edad");
        const frase = document.getElementById("fraseDatos");

        frase.innerText = `Soy ${nombre.value} y tengo ${edad.value} años.`; 
    });

        document.querySelector("#btnCalcular").addEventListener("click", function(event) {
        
        event.preventDefault();

       let resultadoCalculo=0;

        const valor1 = document.getElementById("valor1");
        const valor2 = document.getElementById("valor2");
        const resultado = document.getElementById("resultadoOperacion");
        const operacion = document.getElementById("operacion");

            if(operacion.value=="Suma"){
                resultadoCalculo=Number(valor1.value)+Number(valor2.value);
            }else if(operacion.value=="Resta"){
                resultadoCalculo=Number(valor1.value)-Number(valor2.value);
            }else if(operacion.value=="Multiplicacion"){
                resultadoCalculo=Number(valor1.value)*Number(valor2.value);
            }else if(operacion.value=="Division"&&valor2.value>0){
                resultadoCalculo=Number(valor1.value)/Number(valor2.value)
            }else{
                resultadoCalculo="ERROR! No se puede dividir por 0"
            }

            resultado.innerText=resultadoCalculo;

    });
    

</script>









</body>
</html>
